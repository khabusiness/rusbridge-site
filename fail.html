<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Оплата не прошла — RusBridge</title>
  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#070b14,#0b1220);
      color:#e8eefc;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      text-align:center;
    }
    .card{
      background:rgba(15,26,47,.85);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:30px;
      max-width:460px;
      box-shadow:0 10px 40px rgba(0,0,0,.35);
    }
    .icon{
      font-size:42px;
      margin-bottom:10px;
    }
    .btn{
      display:inline-block;
      margin-top:16px;
      padding:10px 16px;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      text-decoration:none;
    }
    .btn.primary{
      background:rgba(77,163,255,.18);
      border:1px solid rgba(77,163,255,.35);
    }
    .btn + .btn{
      margin-left:8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <h2>Оплата не прошла</h2>
    <p>
      Платёж был отменён или произошла ошибка при обработке.
      Попробуйте ещё раз или выберите другой способ оплаты.
    </p>

    <div style="margin-top:20px;">
      <a class="btn primary" href="https://t.me/RusBridgeBot">
        Вернуться в бот
      </a>
      <a class="btn" href="index.html">
        На главную
      </a>
    </div>
  </div>
</body>
</html>
